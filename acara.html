    <script>
        const upcoming=document.getElementById('upcomingEvents'),past=document.getElementById('pastEvents');
        eventsData.forEach(e=>{const card=`<div class="fade-in flex flex-col md:flex-row gap-4 bg-light dark:bg-dark rounded-xl p-6 hover:shadow-lg transition border-l-4 ${e.upcoming?'border-primary':'border-gray-300 dark:border-gray-700 opacity-70'}"><div class="flex-shrink-0 text-center md:w-20"><div class="text-3xl font-heading font-bold ${e.upcoming?'text-primary':'text-gray-400'}">${e.day}</div><div class="text-sm font-medium text-gray-500">${e.month}</div><div class="text-xs text-gray-400">${e.year}</div></div><div class="flex-1"><h3 class="font-heading text-lg font-semibold mb-1">${e.title}</h3><p class="text-sm text-gray-500 dark:text-gray-400 mb-2">📍 ${e.location}</p><p class="text-sm text-gray-600 dark:text-gray-400">${e.description}</p></div>${e.upcoming?'<span class="self-start px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full text-xs font-medium">Mendatang</span>':'<span class="self-start px-3 py-1 bg-gray-100 dark:bg-gray-800 text-gray-500 rounded-full text-xs font-medium">Selesai</span>'}</div>`;if(e.upcoming)upcoming.innerHTML+=card;else past.innerHTML+=card;});
    </script>
