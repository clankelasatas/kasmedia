    <main class="pt-24 max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
        <article>
            <div id="articleContent" class="fade-in"></div>
            <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-800">
                <h4 class="font-heading font-semibold mb-3">Bagikan Artikel:</h4>
                <div class="flex flex-wrap gap-3">
                    <button onclick="shareWhatsApp()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition text-sm">WhatsApp</button>
                    <button onclick="shareTwitter()" class="px-4 py-2 bg-blue-400 text-white rounded-lg hover:bg-blue-500 transition text-sm">Twitter</button>
                    <button onclick="shareFacebook()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">Facebook</button>
                    <button onclick="copyLink()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition text-sm" id="copyLinkBtn">📋 Salin Link</button>
                </div>
            </div>
            <div id="authorCard" class="mt-8 bg-light dark:bg-dark rounded-xl p-6 fade-in"></div>
            <div class="mt-12">
                <h3 class="font-heading text-2xl font-bold mb-6">Artikel Terkait</h3>
                <div id="relatedArticles" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
            </div>
        </article>
    </main>

    <footer class="mt-20 border-t border-gray-200 dark:border-gray-800 bg-light dark:bg-dark"><div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-center text-sm text-gray-500"><p>&copy; 2026 KASMEDIA : Supported by  Kelas Atas ❤️</p></div></footer>
    <button id="backToTop" class="fixed bottom-6 right-6 w-12 h-12 bg-primary text-white rounded-full shadow-lg flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 hover:bg-primary-hover z-50" aria-label="Kembali ke atas"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg></button>

    <script src="js/data.js"></script><script src="js/darkmode.js"></script><script src="js/main.js"></script><script src="js/search.js"></script>
    <script>
        const urlParams=new URLSearchParams(window.location.search);const articleId=parseInt(urlParams.get('id'))||1;const article=articlesData.find(a=>a.id===articleId);
        if(article){document.title=`${article.title} — KASMEDIA`;const author=membersData.find(m=>m.name===article.author)||membersData[0];
        document.getElementById('articleContent').innerHTML=`<a href="index.html" class="inline-flex items-center gap-1 text-primary hover:text-primary-light mb-4 text-sm transition-colors duration-300">← Kembali ke Beranda</a><span class="inline-block px-3 py-1 bg-primary/10 text-primary rounded-full text-xs font-medium mb-4 ml-2">${article.category}</span><h1 class="font-heading text-3xl md:text-4xl font-bold mb-4 leading-tight">${article.title}</h1><div class="flex flex-wrap items-center gap-3 mb-6 text-sm text-gray-500"><div class="flex items-center gap-2"><img src="${author.avatar}" alt="${article.author}" class="w-6 h-6 rounded-full object-cover flex-shrink-0 aspect-square"><span class="text-xs font-medium text-gray-600 dark:text-gray-300">${article.author}</span></div><span class="text-xs">•</span><span class="text-[11px] text-gray-400">📅 ${article.date}</span></div><img src="${article.image}" alt="${article.title}" class="w-full rounded-xl mb-8 object-cover max-h-[450px]"><div class="article-body">${article.body}</div>`;
        document.getElementById('authorCard').innerHTML=`<div class="flex items-center gap-4"><img src="${author.avatar}" alt="${author.name}" class="w-14 h-14 rounded-full object-cover flex-shrink-0 aspect-square"><div><h4 class="font-heading font-semibold text-sm">${author.name}</h4><p class="text-xs text-primary">${author.role}</p><p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${author.bio}</p></div></div>`;
        const related=articlesData.filter(a=>a.category===article.category&&a.id!==article.id).slice(0,3);const fallback=related.length>0?related:articlesData.filter(a=>a.id!==article.id).slice(0,3);const rc=document.getElementById('relatedArticles');
        fallback.forEach(r=>{rc.innerHTML+=`<a href="artikel.html?id=${r.id}" class="group bg-light dark:bg-dark rounded-xl overflow-hidden hover:shadow-lg transition"><img src="${r.image}" alt="${r.title}" class="w-full h-36 object-cover group-hover:scale-105 transition-transform duration-300"><div class="p-4"><span class="text-xs text-primary font-medium">${r.category}</span><h4 class="font-heading font-semibold text-sm mt-1 group-hover:text-primary-light transition-colors duration-300">${r.title}</h4></div></a>`;});}
        function shareWhatsApp(){window.open(`https://wa.me/?text=${encodeURIComponent(document.title+' '+window.location.href)}`);}
        function shareTwitter(){window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(document.title)}&url=${encodeURIComponent(window.location.href)}`);}
        function shareFacebook(){window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`);}
        function copyLink(){navigator.clipboard.writeText(window.location.href);document.getElementById('copyLinkBtn').innerHTML='✅ Tersalin!';setTimeout(()=>{document.getElementById('copyLinkBtn').innerHTML='📋 Salin Link';},2000);}
    </script>
